# =============================================================================
# Espria Azure Landing Zone – Multi-Variant Pipeline
# azure-pipelines.yaml
#
# Supports three variants selectable via pipeline parameter:
#   A: sophos-nva       Hub-Spoke + Sophos XG NVA
#   B: vwan-azfw        Azure Virtual WAN + Azure Firewall Premium
#   C: hub-azfw-vpngw   Hub-Spoke + Azure Firewall + Active-Active VPN Gateway
# =============================================================================

trigger:
  branches:
    include: [main]
  paths:
    include: ['variants/*', 'shared/*']

pr:
  branches:
    include: [main]

parameters:
  - name: variant
    displayName: 'Landing Zone Variant'
    type: string
    default: 'sophos-nva'
    values: [sophos-nva, vwan-azfw, hub-azfw-vpngw, sophos-nva-entrads, vwan-azfw-entrads, hub-azfw-vpngw-entrads]

  - name: primaryRegion
    displayName: 'Primary Azure Region'
    type: string
    default: 'uksouth'

  - name: deploySecondaryRegion
    displayName: 'Deploy Secondary Region'
    type: boolean
    default: true

variables:
  bicepFile:      'variants/${{ parameters.variant }}/main.bicep'
  parametersFile: 'variants/${{ parameters.variant }}/main.parameters.json'
  deployLocation: ${{ parameters.primaryRegion }}

stages:

# ── Stage 1: Validate ────────────────────────────────────────────────────────
  - stage: Validate
    displayName: '1 – Validate (${{ parameters.variant }})'
    jobs:
      - job: LintAndWhatIf
        pool: { vmImage: 'ubuntu-latest' }
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: 'Install Bicep'
            inputs:
              azureSubscription: 'sc-espria-lz-subscription'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: az bicep install

          - task: AzureCLI@2
            displayName: 'Lint – all modules'
            inputs:
              azureSubscription: 'sc-espria-lz-subscription'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                find shared/ variants/${{ parameters.variant }}/ -name "*.bicep" | while read f; do
                  echo "Linting: $f"
                  az bicep lint --file "$f"
                done
                echo "✅ All lint checks passed"

          - task: AzureCLI@2
            displayName: 'Build (compile)'
            inputs:
              azureSubscription: 'sc-espria-lz-subscription'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: az bicep build --file $(bicepFile) --outfile /tmp/compiled.json && echo "✅ Compiled"

          - task: AzureCLI@2
            displayName: 'What-If'
            inputs:
              azureSubscription: 'sc-espria-lz-subscription'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment sub what-if \
                  --location $(deployLocation) \
                  --template-file $(bicepFile) \
                  --parameters $(parametersFile) \
                    adminPassword="$(ADMIN_PASSWORD)" \
                    customerName="$(CUSTOMER_NAME)" \
                    customerAbbreviation="$(CUSTOMER_ABBR)" \
                    customerDomainName="$(CUSTOMER_DOMAIN)" \
                  --result-format FullResourcePayloads
            env:
              ADMIN_PASSWORD: $(ADMIN_PASSWORD)

# ── Stage 2: Management Groups ───────────────────────────────────────────────
  - stage: ManagementGroups
    displayName: '2 – Management Groups'
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployMGs
        pool: { vmImage: 'ubuntu-latest' }
        environment: 'lz-management-groups'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: AzureCLI@2
                  displayName: 'Deploy MG Hierarchy (tenant scope)'
                  inputs:
                    azureSubscription: 'sc-espria-lz-tenant'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment tenant create \
                        --location $(deployLocation) \
                        --template-file shared/governance/managementGroups.bicep \
                        --parameters customerName="$(CUSTOMER_NAME)" customerAbbreviation="$(CUSTOMER_ABBR)"

# ── Stage 3: Landing Zone ────────────────────────────────────────────────────
  - stage: LandingZone
    displayName: '3 – Landing Zone (${{ parameters.variant }})'
    dependsOn: ManagementGroups
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployLZ
        pool: { vmImage: 'ubuntu-latest' }
        environment: 'lz-production'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Accept Sophos Marketplace Terms (sophos-nva only)'
                  condition: or(eq('${{ parameters.variant }}','sophos-nva'),eq('${{ parameters.variant }}','sophos-nva-entrads'))
                  inputs:
                    azureSubscription: 'sc-espria-lz-subscription'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az vm image terms accept --publisher sophos --offer sophos-xg --plan byol \
                        --subscription $(AZURE_SUBSCRIPTION_ID) || true

                - task: AzureCLI@2
                  displayName: 'Deploy ${{ parameters.variant }}'
                  inputs:
                    azureSubscription: 'sc-espria-lz-subscription'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment sub create \
                        --location $(deployLocation) \
                        --template-file $(bicepFile) \
                        --parameters $(parametersFile) \
                          adminPassword="$(ADMIN_PASSWORD)" \
                          customerName="$(CUSTOMER_NAME)" \
                          customerAbbreviation="$(CUSTOMER_ABBR)" \
                          customerDomainName="$(CUSTOMER_DOMAIN)" \
                          deploySecondaryRegion=${{ parameters.deploySecondaryRegion }} \
                        --name "lz-${{ parameters.variant }}-$(Build.BuildNumber)"
                  env:
                    ADMIN_PASSWORD: $(ADMIN_PASSWORD)

# ── Stage 4: Verify ──────────────────────────────────────────────────────────
  - stage: Verify
    displayName: '4 – Verify (${{ parameters.variant }})'
    dependsOn: LandingZone
    condition: succeeded()
    jobs:
      - job: SmokeTests
        pool: { vmImage: 'ubuntu-latest' }
        steps:
          - task: AzureCLI@2
            displayName: 'Smoke Tests'
            inputs:
              azureSubscription: 'sc-espria-lz-subscription'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                ABBR_UPPER=$(echo $(CUSTOMER_ABBR) | tr '[:lower:]' '[:upper:]')
                REGION=$(deployLocation); ENV=prod; PASS=0; FAIL=0
                check() { if eval "$2" > /dev/null 2>&1; then echo "  ✅  $1"; ((PASS++)); else echo "  ❌  $1"; ((FAIL++)); fi; }

                for RG_SUFFIX in connectivity identity management; do
                  check "RG rg-${ENV}-core-${RG_SUFFIX}-${ABBR_UPPER}-${REGION}-01" \
                    "az group show --name rg-${ENV}-core-${RG_SUFFIX}-${ABBR_UPPER}-${REGION}-01"
                done

                CONN_RG="rg-${ENV}-core-connectivity-${ABBR_UPPER}-${REGION}-01"

                if [ "${{ parameters.variant }}" = "sophos-nva" ]; then
                  check "Sophos NVA VM" "az vm list -g $CONN_RG --query \"[?contains(name,'SFOS')].name\" --output tsv | grep -q SFOS"
                fi
                if [ "${{ parameters.variant }}" != "sophos-nva" ]; then
                  check "Azure Firewall" "az network firewall list -g $CONN_RG --query '[].name' --output tsv | grep -q azfw"
                fi
                if [ "${{ parameters.variant }}" = "hub-azfw-vpngw" ]; then
                  check "VPN Gateway" "az network vnet-gateway list -g $CONN_RG --query '[].name' --output tsv | grep -q vnet-gw"
                fi
                if [ "${{ parameters.variant }}" = "vwan-azfw" ]; then
                  check "vWAN" "az network vwan list -g $CONN_RG --query '[].name' --output tsv | grep -q vwan"
                fi

                MGMT_RG="rg-${ENV}-core-management-${ABBR_UPPER}-${REGION}-01"
                check "Log Analytics Workspace" "az monitor log-analytics workspace list -g $MGMT_RG --query '[].name' --output tsv | grep -q log-"
                check "DC VMs" "az vm list -g rg-${ENV}-core-identity-${ABBR_UPPER}-${REGION}-01 --query '[].name' --output tsv | grep -q DC"

                echo "PASS=$PASS FAIL=$FAIL"
                [ $FAIL -eq 0 ] || exit 1
